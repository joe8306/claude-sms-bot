# Fly.io config for the Claude SMS bot.
# `flyctl launch` will read this and create a real app on first deploy.
# (the app name below is a placeholder - flyctl will rename if it's taken)

app = "claude-sms-bot-chaim"
primary_region = "iad"  # Ashburn VA - close to most US Twilio routing

[build]

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"   # sleep when idle, save money
  auto_start_machines = true    # wake on incoming HTTP (fast - within Twilio's 15s)
  min_machines_running = 0      # 0 = pure pay-per-use

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

# [[mounts]] removed - persistent volumes need a payment method on file.
# Bot falls back to writing conversations.json in the container (resets on
# restart). Add the volume later with `flyctl volumes create` + uncomment.
